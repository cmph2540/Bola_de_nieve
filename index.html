<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bola de Nieve de Deudas — Prototipo</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <div class="container">
      <h1>💠 Bola de Nieve de Deudas</h1>
      <p class="subtitle">Simula abonos extraordinarios, reduce intereses y avanza hacia la libertad financiera.</p>
    </div>
  </header>

  <main class="container">

    <div id="notifications"></div>

    <!-- Nueva obligación -->
    <section class="card">
      <h2 style="margin-top:0;">Crear nueva obligación</h2>
      <form id="formObligacion">

        <div class="row row-3">
          <div>
            <label>Entidad</label>
            <select id="entidadSelect" required></select>
            <div style="margin-top:8px;">
              <button type="button" class="btn btn-outline" id="btnAgregarEntidad">+ Agregar entidad</button>
            </div>
          </div>

          <div>
            <label>Tipo de crédito</label>
            <select id="tipoCredito" required>
              <option value="">Selecciona…</option>
              <option value="consumo">Consumo</option>
              <option value="tarjeta">Tarjeta de crédito</option>
              <option value="vehiculo">Vehículo</option>
              <option value="vivienda_fija">Vivienda tasa fija</option>
            </select>
          </div>

          <div>
            <label>Fecha próximo vencimiento</label>
            <input type="date" id="fechaVencimiento" required />
          </div>
        </div>

        <div class="row row-3" style="margin-top:12px;">
          <div>
            <label>Valor del crédito</label>
            <input type="number" id="valorCredito" required />
          </div>
          <div>
            <label>Valor cuota</label>
            <input type="number" id="valorCuota" required />
          </div>
          <div>
            <label>Interés EA %</label>
            <input type="number" id="interesEA" required />
          </div>
        </div>

        <div style="margin-top:16px;">
          <button type="submit" class="btn btn-primary">➕ Crear obligación</button>
        </div>

      </form>
    </section>

    <section class="card">
      <h2>Mis obligaciones</h2>
      <div id="listaObligaciones"></div>
    </section>

  </main>

  <!-- JS externo -->
  <script src="app.js"></script>
</body>
</html>
